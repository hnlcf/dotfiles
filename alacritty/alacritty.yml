# File Path:
# Windows: C:\Users\Raven\AppData\Roaming\alacritty\alacritty.yml
# Others: $HOME/.config/alacritty/alacritty.yml
# Colors (One Darker)
# Note I am using alacritty-ligatures until ligatures make it upstream
colors:
  # Default colors
  primary:
    background: "#282828"
    foreground: "#d5c4a1"

      # Normal colors
      # Nord
  normal:
    black:   "#282828"
    red:     "#cc241d"
    green:   "#98971a"
    yellow:  "#d79921"
    blue:    "#458588"
    magenta: "#b16286"
    cyan:    "#689d6a"
    white:   "#fbf1c7"

      # Bright colors
  bright:
    black:   "#5c6370"
    red:     "#cc241d"
    green:   "#98971a"
    yellow:  "#d79921"
    blue:    "#458588"
    magenta: "#b16286"
    cyan:    "#689d6a"
    white:   "#e6efff"

  dim:
    black:   "#282828"
    red:     "#cc241d"
    green:   "#98971a"
    yellow:  "#d79921"
    blue:    "#458588"
    magenta: "#b16286"
    cyan:    "#689d6a"
    white:   "#fbf1c7"


